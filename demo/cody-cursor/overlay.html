<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cody cursor overlay</title>
  <style>
    :root {
      --cody-blue: #1b4fd8;
      --cody-ink: #0a1628;
      --cody-wash: #e8f0fe;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: "Segoe UI", system-ui, sans-serif;
      cursor: default;
    }
    .stage {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    #cody-cursor {
      position: fixed;
      width: 28px;
      height: 28px;
      left: 0;
      top: 0;
      pointer-events: none;
      z-index: 2147483646;
      will-change: left, top;
      filter: drop-shadow(0 1px 3px rgba(10, 22, 40, 0.4));
    }
    #cody-cursor img {
      display: block;
      width: 28px;
      height: 28px;
    }
    #caption {
      position: fixed;
      max-width: 220px;
      padding: 6px 10px;
      border-radius: 10px;
      background: rgba(10, 22, 40, 0.92);
      color: #fff;
      font-size: 12px;
      line-height: 1.35;
      pointer-events: none;
      z-index: 2147483647;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 160ms ease, transform 160ms ease;
      box-shadow: 0 4px 14px rgba(10, 22, 40, 0.25);
    }
    #caption::before {
      content: "";
      position: absolute;
      left: -5px;
      top: 10px;
      border: 5px solid transparent;
      border-right-color: rgba(10, 22, 40, 0.92);
    }
    #caption.show {
      opacity: 1;
      transform: translateY(0);
    }
    .hud {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 2147483647;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      pointer-events: auto;
      cursor: default;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(10, 22, 40, 0.82);
      color: #fff;
      font-size: 13px;
      max-width: min(560px, calc(100vw - 32px));
    }
    .hud button {
      border: 0;
      border-radius: 6px;
      padding: 6px 10px;
      background: var(--cody-blue);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .hud button:hover { filter: brightness(1.08); }
    .hud button.secondary {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.35);
    }
    .hud button.listening {
      background: #c0392b;
      animation: pulse 1s ease infinite;
    }
    @keyframes pulse {
      50% { filter: brightness(1.15); }
    }
    .hud kbd {
      font: inherit;
      padding: 1px 5px;
      border-radius: 4px;
      background: rgba(255,255,255,0.12);
    }
    .mock-desktop {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(1200px 600px at 20% 0%, #dce8fc 0%, transparent 55%),
        linear-gradient(180deg, #f4f7fb 0%, #e8eef6 100%);
      z-index: 0;
    }
    .mock-desktop.hidden { display: none !important; }
    .file {
      position: absolute;
      width: 96px;
      text-align: center;
      color: var(--cody-ink);
      font-size: 11px;
      line-height: 1.25;
      pointer-events: none;
    }
    .file .icon {
      width: 56px;
      height: 64px;
      margin: 0 auto 6px;
      border-radius: 6px;
      background: #fff;
      border: 1px solid #c5d0e0;
      box-shadow: 0 2px 8px rgba(10, 22, 40, 0.08);
      display: grid;
      place-items: center;
      font-size: 22px;
    }
    .file.highlight .icon {
      outline: 3px solid var(--cody-blue);
      outline-offset: 2px;
    }
    .ring {
      position: fixed;
      width: 28px;
      height: 28px;
      margin: -14px 0 0 -14px;
      border: 2px solid var(--cody-blue);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      z-index: 2147483645;
    }
    .ring.pop { animation: pop 600ms ease-out forwards; }
    @keyframes pop {
      0% { opacity: 0.9; transform: scale(0.4); }
      100% { opacity: 0; transform: scale(2.2); }
    }
  </style>
</head>
<body>
  <div class="mock-desktop" id="mock-desktop" aria-hidden="true">
    <div class="file" data-id="lazada" style="left: 18%; top: 28%;">
      <div class="icon">📄</div>
      receipt_lazada.pdf
    </div>
    <div class="file" data-id="shopee" style="left: 42%; top: 36%;">
      <div class="icon">📄</div>
      invoice_shopee.pdf
    </div>
    <div class="file" data-id="notes" style="left: 66%; top: 24%;">
      <div class="icon">📝</div>
      meeting_notes.txt
    </div>
  </div>

  <div class="stage">
    <div id="cody-cursor" aria-hidden="true">
      <img id="cody-cursor-img" alt="" width="28" height="28" />
    </div>
    <div id="caption" role="status" aria-live="polite"></div>
    <div class="ring" id="ring" aria-hidden="true"></div>
  </div>

  <div class="hud" id="hud">
    <span id="status">Say “where’s Lazada” or use the mic</span>
    <button type="button" id="btn-mic">🎤 Listen</button>
    <button type="button" id="btn-point">Point → Lazada</button>
    <button type="button" id="btn-shopee" class="secondary">Point → Shopee</button>
    <button type="button" id="btn-follow" class="secondary">Follow again</button>
    <span><kbd>1</kbd>/<kbd>2</kbd> · <kbd>V</kbd> mic · <kbd>Esc</kbd> follow</span>
  </div>

  <script>
    (function () {
      const ASSET_DEFAULT = "../../assets/cody-cursor/cursor-default.svg";
      const ASSET_POINT = "../../assets/cody-cursor/cursor-point.svg";
      const SLOT = { x: 18, y: 22 };
      const CAPTION_GAP = { x: 34, y: -4 };
      const SIZE = 28;
      const SPRING = 0.12;
      const DAMP = 0.78;
      const ANIM_MS = 900;

      /** Only hide mock desktop when host explicitly asks (?nomock=1). */
      const params = new URLSearchParams(location.search);
      const hideMock = params.get("nomock") === "1";

      const el = document.getElementById("cody-cursor");
      const img = document.getElementById("cody-cursor-img");
      const caption = document.getElementById("caption");
      const ring = document.getElementById("ring");
      const status = document.getElementById("status");
      const mock = document.getElementById("mock-desktop");
      const btnMic = document.getElementById("btn-mic");

      if (hideMock) mock.classList.add("hidden");

      img.src = ASSET_DEFAULT;

      const THOUGHTS = {
        lazada: "I think this is your Lazada receipt.",
        shopee: "Looks like the Shopee invoice.",
        notes: "These are your meeting notes.",
      };

      const VOICE_RULES = [
        { re: /\b(lazada|lazad[ao]?|resibo.*lazada|receipt.*lazada)\b/i, id: "lazada" },
        { re: /\b(shopee|shope|invoice.*shopee)\b/i, id: "shopee" },
        { re: /\b(notes?|meeting)\b/i, id: "notes" },
      ];

      let mode = "follow";
      let mouse = { x: innerWidth * 0.45, y: innerHeight * 0.4 };
      let pos = { x: mouse.x + SLOT.x, y: mouse.y + SLOT.y };
      let vel = { x: 0, y: 0 };
      let target = null;
      let animStart = 0;
      let animFrom = { x: 0, y: 0 };
      let animTo = { x: 0, y: 0 };
      let listening = false;
      let recognition = null;

      function setSprite(pointing) {
        img.src = pointing ? ASSET_POINT : ASSET_DEFAULT;
      }

      function place(x, y) {
        if (!Number.isFinite(x) || !Number.isFinite(y)) return;
        pos.x = x;
        pos.y = y;
        el.style.left = x + "px";
        el.style.top = y + "px";
        // Caption floats beside the small Cody cursor
        caption.style.left = x + CAPTION_GAP.x + "px";
        caption.style.top = y + CAPTION_GAP.y + "px";
      }

      function showCaption(text) {
        caption.textContent = text || "";
        caption.classList.toggle("show", Boolean(text));
      }

      function hideCaption() {
        caption.classList.remove("show");
        caption.textContent = "";
      }

      function slotPos() {
        return { x: mouse.x + SLOT.x, y: mouse.y + SLOT.y };
      }

      function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      function fileCenter(id) {
        const node = document.querySelector('.file[data-id="' + id + '"] .icon');
        if (!node) return null;
        const r = node.getBoundingClientRect();
        // Hidden/display:none icons report 0×0 — that was the point-break bug
        if (r.width < 2 || r.height < 2) return null;
        return {
          x: r.left + r.width / 2,
          y: r.top + r.height / 2,
          el: node.closest(".file"),
        };
      }

      function clearHighlight() {
        document.querySelectorAll(".file.highlight").forEach((n) => n.classList.remove("highlight"));
      }

      function pointAt(id, thought) {
        if (hideMock) {
          status.textContent = "Mock desktop hidden — open without ?nomock=1";
          return;
        }
        const dest = fileCenter(id);
        if (!dest) {
          status.textContent = "Can't see that file yet — is the mock desktop visible?";
          showCaption("I can't find that source on screen.");
          return;
        }
        mode = "animating";
        setSprite(true);
        clearHighlight();
        vel.x = 0;
        vel.y = 0;
        animFrom = { x: pos.x, y: pos.y };
        animTo = {
          x: dest.x - SIZE * 0.25,
          y: dest.y - SIZE * 0.25,
        };
        animStart = performance.now();
        target = dest;
        const line = thought || THOUGHTS[id] || ("I think this is " + id + ".");
        showCaption(line);
        status.textContent = "Pointing at " + id + "…";
        try {
          parent.postMessage({ type: "cody-status", mode: "animating", target: id }, "*");
        } catch (_) {}
      }

      function resumeFollow() {
        mode = "follow";
        setSprite(false);
        clearHighlight();
        vel.x = 0;
        vel.y = 0;
        hideCaption();
        status.textContent = 'Say “where’s Lazada” or use the mic';
        try {
          parent.postMessage({ type: "cody-status", mode: "follow" }, "*");
        } catch (_) {}
      }

      function matchVoice(transcript) {
        const t = String(transcript || "").trim();
        if (!t) return null;
        for (let i = 0; i < VOICE_RULES.length; i++) {
          if (VOICE_RULES[i].re.test(t)) return VOICE_RULES[i].id;
        }
        // Loose: "where's X" / "where is X"
        const m = t.match(/where'?s?\s+(?:is\s+)?(.+)/i);
        if (m) {
          const rest = m[1];
          for (let i = 0; i < VOICE_RULES.length; i++) {
            if (VOICE_RULES[i].re.test(rest)) return VOICE_RULES[i].id;
          }
        }
        return null;
      }

      function handleHeard(transcript) {
        status.textContent = "Heard: “" + transcript + "”";
        const id = matchVoice(transcript);
        if (!id) {
          showCaption("I didn't catch a file — try “where’s Lazada”.");
          return;
        }
        showCaption("Okay — looking for " + id + "…");
        pointAt(id, THOUGHTS[id]);
      }

      function setupSpeech() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
          btnMic.disabled = true;
          btnMic.title = "Speech recognition not supported in this browser";
          status.textContent = "Voice needs Chrome/Edge — use buttons or 1/2";
          return;
        }
        recognition = new SR();
        recognition.lang = "en-PH";
        recognition.interimResults = false;
        recognition.maxAlternatives = 3;
        recognition.continuous = false;

        recognition.onstart = function () {
          listening = true;
          btnMic.classList.add("listening");
          btnMic.textContent = "Listening…";
          status.textContent = "Listening — say “where’s Lazada”";
        };
        recognition.onend = function () {
          listening = false;
          btnMic.classList.remove("listening");
          btnMic.textContent = "🎤 Listen";
        };
        recognition.onerror = function (ev) {
          listening = false;
          btnMic.classList.remove("listening");
          btnMic.textContent = "🎤 Listen";
          status.textContent = "Mic error: " + (ev.error || "unknown");
        };
        recognition.onresult = function (ev) {
          let best = "";
          for (let i = 0; i < ev.results.length; i++) {
            for (let j = 0; j < ev.results[i].length; j++) {
              const alt = ev.results[i][j].transcript;
              if (alt && alt.length > best.length) best = alt;
            }
          }
          handleHeard(best);
        };
      }

      function toggleMic() {
        if (!recognition) {
          status.textContent = "Speech recognition unavailable";
          return;
        }
        if (listening) {
          try { recognition.stop(); } catch (_) {}
          return;
        }
        try {
          recognition.start();
        } catch (_) {
          status.textContent = "Mic busy — try again";
        }
      }

      function onMove(x, y) {
        if (!Number.isFinite(x) || !Number.isFinite(y)) return;
        mouse.x = x;
        mouse.y = y;
      }

      window.addEventListener("mousemove", function (e) {
        onMove(e.clientX, e.clientY);
      });

      window.addEventListener("message", function (e) {
        const data = e.data || {};
        if (data.type === "cody-mouse" && typeof data.x === "number") onMove(data.x, data.y);
        if (data.type === "cody-point") {
          if (typeof data.x === "number" && typeof data.y === "number") {
            mode = "animating";
            setSprite(true);
            vel.x = 0;
            vel.y = 0;
            animFrom = { x: pos.x, y: pos.y };
            animTo = { x: data.x - SIZE * 0.25, y: data.y - SIZE * 0.25 };
            animStart = performance.now();
            target = { x: data.x, y: data.y, el: null };
            showCaption(data.thought || "I think this is it.");
          } else if (data.id) {
            pointAt(data.id, data.thought);
          }
        }
        if (data.type === "cody-follow") resumeFollow();
        if (data.type === "cody-heard" && data.transcript) handleHeard(data.transcript);
      });

      function tick(now) {
        if (mode === "follow") {
          const slot = slotPos();
          const ax = (slot.x - pos.x) * SPRING;
          const ay = (slot.y - pos.y) * SPRING;
          vel.x = (vel.x + ax) * DAMP;
          vel.y = (vel.y + ay) * DAMP;
          place(pos.x + vel.x, pos.y + vel.y);
        } else if (mode === "animating") {
          const t = Math.min(1, (now - animStart) / ANIM_MS);
          const e = easeInOutCubic(t);
          place(
            animFrom.x + (animTo.x - animFrom.x) * e,
            animFrom.y + (animTo.y - animFrom.y) * e
          );
          if (t >= 1) {
            mode = "pointed";
            if (target && target.el) target.el.classList.add("highlight");
            ring.style.left = (target ? target.x : animTo.x) + "px";
            ring.style.top = (target ? target.y : animTo.y) + "px";
            ring.classList.remove("pop");
            void ring.offsetWidth;
            ring.classList.add("pop");
            status.textContent = "Found it";
            try {
              parent.postMessage({ type: "cody-status", mode: "pointed" }, "*");
            } catch (_) {}
          }
        } else if (mode === "pointed") {
          // Stay put; keep caption parked next to Cody
          place(pos.x, pos.y);
        }
        requestAnimationFrame(tick);
      }

      setupSpeech();
      requestAnimationFrame(tick);

      document.getElementById("btn-point").onclick = function () {
        pointAt("lazada");
      };
      document.getElementById("btn-shopee").onclick = function () {
        pointAt("shopee");
      };
      document.getElementById("btn-follow").onclick = resumeFollow;
      btnMic.onclick = toggleMic;

      window.addEventListener("keydown", function (e) {
        if (e.key === "1") pointAt("lazada");
        if (e.key === "2") pointAt("shopee");
        if (e.key === "v" || e.key === "V") toggleMic();
        if (e.key === "Escape") resumeFollow();
      });

      try {
        parent.postMessage({ type: "cody-ready", slot: SLOT, size: SIZE }, "*");
      } catch (_) {}
      place(pos.x, pos.y);
    })();
  </script>
</body>
</html>
