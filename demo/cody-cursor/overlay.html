<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cody cursor overlay</title>
  <style>
    :root {
      --cody-blue: #1b4fd8;
      --cody-ink: #0a1628;
      --cody-wash: #e8f0fe;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: "Segoe UI", system-ui, sans-serif;
      cursor: default;
    }
    .stage {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    #cody-cursor {
      position: fixed;
      width: 28px;
      height: 28px;
      left: 0;
      top: 0;
      pointer-events: none;
      z-index: 2147483646;
      will-change: left, top;
      filter: drop-shadow(0 1px 3px rgba(10, 22, 40, 0.4));
    }
    #cody-cursor img {
      display: block;
      width: 28px;
      height: 28px;
    }
    #caption {
      position: fixed;
      max-width: 220px;
      padding: 6px 10px;
      border-radius: 10px;
      background: rgba(10, 22, 40, 0.92);
      color: #fff;
      font-size: 12px;
      line-height: 1.35;
      pointer-events: none;
      z-index: 2147483647;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 160ms ease, transform 160ms ease;
      box-shadow: 0 4px 14px rgba(10, 22, 40, 0.25);
    }
    #caption::before {
      content: "";
      position: absolute;
      left: -5px;
      top: 10px;
      border: 5px solid transparent;
      border-right-color: rgba(10, 22, 40, 0.92);
    }
    #caption.show {
      opacity: 1;
      transform: translateY(0);
    }
    .hud {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 2147483647;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      pointer-events: auto;
      cursor: default;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(10, 22, 40, 0.82);
      color: #fff;
      font-size: 13px;
      max-width: min(560px, calc(100vw - 32px));
    }
    .hud button {
      border: 0;
      border-radius: 6px;
      padding: 6px 10px;
      background: var(--cody-blue);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .hud button:hover { filter: brightness(1.08); }
    /* Mouse clicks must not leave a sticky focus ring; keyboard focus still visible */
    .hud button:focus { outline: none; }
    .hud button:focus-visible { outline: 2px solid #5dade2; outline-offset: 2px; }
    .hud button.secondary {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.35);
    }
    .hud button.listening {
      background: #c0392b;
    }
    .mic-meter {
      display: none;
      align-items: flex-end;
      gap: 3px;
      height: 22px;
      padding: 0 4px;
    }
    .mic-meter.on { display: inline-flex; }
    .mic-meter span {
      display: block;
      width: 4px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.22);
      transition: height 60ms linear, background 60ms linear;
    }
    .mic-meter span.lit {
      background: #5dade2;
    }
    .mic-meter span.hot {
      background: #2ecc71;
    }
    .mic-meter span.peak {
      background: #f1c40f;
    }
    .hud input[type="text"] {
      width: 220px;
      padding: 6px 8px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 6px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font: inherit;
    }
    .hud input[type="text"]::placeholder {
      color: rgba(255,255,255,0.55);
    }
    .hud input[type="text"]:focus {
      outline: 2px solid #5dade2;
      outline-offset: 1px;
    }
    .hud kbd {
      font: inherit;
      padding: 1px 5px;
      border-radius: 4px;
      background: rgba(255,255,255,0.12);
    }
    .mock-desktop {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(1200px 600px at 20% 0%, #dce8fc 0%, transparent 55%),
        linear-gradient(180deg, #f4f7fb 0%, #e8eef6 100%);
      z-index: 0;
    }
    .mock-desktop.hidden { display: none !important; }
    .file {
      position: absolute;
      width: 84px;
      text-align: center;
      color: var(--cody-ink);
      font-size: 11px;
      line-height: 1.25;
      pointer-events: none;
    }
    .file .icon {
      width: 48px;
      height: 56px;
      margin: 0 auto 5px;
      border-radius: 6px;
      background: #fff;
      border: 1px solid #c5d0e0;
      box-shadow: 0 2px 8px rgba(10, 22, 40, 0.08);
      display: grid;
      place-items: center;
      font-size: 20px;
    }
    .file.highlight .icon {
      outline: 3px solid var(--cody-blue);
      outline-offset: 2px;
    }
    .ring {
      position: fixed;
      width: 28px;
      height: 28px;
      margin: -14px 0 0 -14px;
      border: 2px solid var(--cody-blue);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      z-index: 2147483645;
    }
    .ring.pop { animation: pop 600ms ease-out forwards; }
    @keyframes pop {
      0% { opacity: 0.9; transform: scale(0.4); }
      100% { opacity: 0; transform: scale(2.2); }
    }
  </style>
</head>
<body>
  <div class="mock-desktop" id="mock-desktop" aria-hidden="true">
    <div class="file" data-id="lazada" data-keywords="lazada receipt resibo order shopping pdf" style="left: 8%; top: 12%;">
      <div class="icon">🧾</div>
      <div class="name">receipt_lazada.pdf</div>
    </div>
    <div class="file" data-id="shopee" data-keywords="shopee invoice bill order shopping pdf" style="left: 27%; top: 9%;">
      <div class="icon">🛒</div>
      <div class="name">invoice_shopee.pdf</div>
    </div>
    <div class="file" data-id="notes" data-keywords="meeting notes minutes standup memo text" style="left: 46%; top: 13%;">
      <div class="icon">📝</div>
      <div class="name">meeting_notes.txt</div>
    </div>
    <div class="file" data-id="budget" data-keywords="budget spreadsheet finance excel money expenses 2026" style="left: 65%; top: 9%;">
      <div class="icon">📊</div>
      <div class="name">budget_2026.xlsx</div>
    </div>
    <div class="file" data-id="resume" data-keywords="resume cv curriculum vitae job troy application" style="left: 84%; top: 13%;">
      <div class="icon">📄</div>
      <div class="name">resume_troy.pdf</div>
    </div>
    <div class="file" data-id="boarding" data-keywords="boarding pass flight ticket travel plane airline trip" style="left: 14%; top: 44%;">
      <div class="icon">✈️</div>
      <div class="name">boarding_pass.pdf</div>
    </div>
    <div class="file" data-id="photo" data-keywords="photo picture image family jpeg png snapshot" style="left: 40%; top: 48%;">
      <div class="icon">🖼️</div>
      <div class="name">family_photo.png</div>
    </div>
    <div class="file" data-id="contract" data-keywords="contract lease rent agreement doc apartment landlord" style="left: 66%; top: 44%;">
      <div class="icon">📑</div>
      <div class="name">rent_contract.docx</div>
    </div>
  </div>

  <div class="stage">
    <div id="cody-cursor" aria-hidden="true">
      <img id="cody-cursor-img" alt="" width="28" height="28" />
    </div>
    <div id="caption" role="status" aria-live="polite"></div>
    <div class="ring" id="ring" aria-hidden="true"></div>
  </div>

  <div class="hud" id="hud">
    <span id="status">Say “find my boarding pass” or type a command</span>
    <button type="button" id="btn-mic">🎤 Voice</button>
    <div class="mic-meter" id="mic-meter" aria-hidden="true" title="Mic level">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <button type="button" id="btn-point" class="secondary">Point → Lazada</button>
    <button type="button" id="btn-shopee" class="secondary">Point → Shopee</button>
    <button type="button" id="btn-follow" class="secondary">Follow again</button>
    <input type="text" id="cmd-input" placeholder='type a command, e.g. "find my boarding pass"' autocomplete="off" spellcheck="false" />
    <button type="button" id="btn-run" class="secondary">Run</button>
    <span><kbd>1</kbd>/<kbd>2</kbd> · <kbd>V</kbd> mic · <kbd>/</kbd> type · <kbd>Esc</kbd> follow</span>
  </div>

  <script>
    (function () {
      // Inline data URIs — avoids broken <img> when a sibling SVG file is corrupt / 404
      const ASSET_DEFAULT =
        "data:image/svg+xml," +
        encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">' +
            '<path d="M6 4 L6 36 L14.5 28.5 L20 42 L26 39.5 L20.5 26 L32 26 Z" fill="#1B4FD8" stroke="#0A1628" stroke-width="1.5" stroke-linejoin="round"/>' +
            '<circle cx="34" cy="14" r="9" fill="#E8F0FE" stroke="#1B4FD8" stroke-width="2"/>' +
            '<circle cx="31.5" cy="13" r="1.4" fill="#0A1628"/>' +
            '<circle cx="36.5" cy="13" r="1.4" fill="#0A1628"/>' +
            '<path d="M31 17.5 Q34 20 37 17.5" stroke="#0A1628" stroke-width="1.4" stroke-linecap="round" fill="none"/>' +
            "</svg>"
        );
      const ASSET_POINT =
        "data:image/svg+xml," +
        encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">' +
            '<path d="M6 4 L4 34 L13 27 L17.5 41 L24 38 L19.5 24.5 L31 22 Z" fill="#1B4FD8" stroke="#0A1628" stroke-width="1.5" stroke-linejoin="round"/>' +
            '<circle cx="36" cy="12" r="9" fill="#E8F0FE" stroke="#1B4FD8" stroke-width="2"/>' +
            '<circle cx="33.5" cy="11" r="1.4" fill="#0A1628"/>' +
            '<circle cx="38.5" cy="11" r="1.4" fill="#0A1628"/>' +
            '<path d="M33 16.5 Q36 19.5 39 16.5" stroke="#0A1628" stroke-width="1.4" stroke-linecap="round" fill="none"/>' +
            '<circle cx="10" cy="10" r="3" fill="#FFD166" opacity="0.9"/>' +
            "</svg>"
        );
      const SLOT = { x: 18, y: 22 };
      const CAPTION_GAP = { x: 34, y: -4 };
      const SIZE = 28;
      const SPRING = 0.12;
      const DAMP = 0.78;
      const ANIM_MS = 900;

      /** Only hide mock desktop when host explicitly asks (?nomock=1). */
      const params = new URLSearchParams(location.search);
      const hideMock = params.get("nomock") === "1";

      const el = document.getElementById("cody-cursor");
      const img = document.getElementById("cody-cursor-img");
      const caption = document.getElementById("caption");
      const ring = document.getElementById("ring");
      const status = document.getElementById("status");
      const mock = document.getElementById("mock-desktop");
      const btnMic = document.getElementById("btn-mic");
      const micMeter = document.getElementById("mic-meter");
      const micBars = micMeter ? micMeter.querySelectorAll("span") : [];

      if (hideMock) mock.classList.add("hidden");

      img.src = ASSET_DEFAULT;
      // Warm the point sprite so the first point swap never flashes broken
      const preloadPoint = new Image();
      preloadPoint.src = ASSET_POINT;

      const THOUGHTS = {
        lazada: "I think this is your Lazada receipt.",
        shopee: "Looks like the Shopee invoice.",
        notes: "These are your meeting notes.",
        budget: "Here's the 2026 budget spreadsheet.",
        resume: "This should be Troy's resume.",
        boarding: "Your boarding pass is right here.",
        photo: "Found the family photo.",
        contract: "This looks like the rent contract.",
      };

      // "resume" is deliberately NOT here — it collides with resume_troy.pdf.
      // Bare "resume" / "resume following" is special-cased in handleCommand.
      const FOLLOW_INTENT = /\b(follow( me)?|stop( pointing)?|never ?mind|cancel|go back)\b/;
      const DEFAULT_STATUS = "Say “find my boarding pass” or type a command";

      let mode = "follow";
      let mouse = { x: innerWidth * 0.45, y: innerHeight * 0.4 };
      let pos = { x: mouse.x + SLOT.x, y: mouse.y + SLOT.y };
      let vel = { x: 0, y: 0 };
      let target = null;
      let animStart = 0;
      let animFrom = { x: 0, y: 0 };
      let animTo = { x: 0, y: 0 };
      let micOn = false; // user intent: keep the mic session alive
      let listening = false; // recognition is actually running right now
      let recognition = null;
      let micStream = null;
      let audioCtx = null;
      let analyser = null;
      let meterRaf = 0;
      let levelSmooth = 0;

      function setSprite(pointing) {
        img.src = pointing ? ASSET_POINT : ASSET_DEFAULT;
      }

      function place(x, y) {
        if (!Number.isFinite(x) || !Number.isFinite(y)) return;
        pos.x = x;
        pos.y = y;
        el.style.left = x + "px";
        el.style.top = y + "px";
        // Caption floats beside the small Cody cursor
        caption.style.left = x + CAPTION_GAP.x + "px";
        caption.style.top = y + CAPTION_GAP.y + "px";
      }

      function showCaption(text) {
        caption.textContent = text || "";
        caption.classList.toggle("show", Boolean(text));
      }

      function hideCaption() {
        caption.classList.remove("show");
        caption.textContent = "";
      }

      function slotPos() {
        return { x: mouse.x + SLOT.x, y: mouse.y + SLOT.y };
      }

      function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      function fileCenter(id) {
        const node = document.querySelector('.file[data-id="' + id + '"] .icon');
        if (!node) return null;
        const r = node.getBoundingClientRect();
        // Hidden/display:none icons report 0×0 — that was the point-break bug
        if (r.width < 2 || r.height < 2) return null;
        return {
          x: r.left + r.width / 2,
          y: r.top + r.height / 2,
          el: node.closest(".file"),
        };
      }

      function clearHighlight() {
        document.querySelectorAll(".file.highlight").forEach((n) => n.classList.remove("highlight"));
      }

      function fileName(id) {
        const node = document.querySelector('.file[data-id="' + id + '"] .name');
        return node ? node.textContent.trim() : id;
      }

      function pointAt(id, thought) {
        if (hideMock) {
          status.textContent = "Mock desktop hidden — open without ?nomock=1";
          return;
        }
        const dest = fileCenter(id);
        if (!dest) {
          status.textContent = "Can't see that file yet — is the mock desktop visible?";
          showCaption("I can't find that source on screen.");
          return;
        }
        mode = "animating";
        setSprite(true);
        clearHighlight();
        vel.x = 0;
        vel.y = 0;
        animFrom = { x: pos.x, y: pos.y };
        animTo = {
          x: dest.x - SIZE * 0.25,
          y: dest.y - SIZE * 0.25,
        };
        animStart = performance.now();
        target = dest;
        const line = thought || THOUGHTS[id] || ("I think this is " + fileName(id) + ".");
        showCaption(line);
        status.textContent = "Pointing at " + fileName(id) + "…";
        try {
          parent.postMessage({ type: "cody-status", mode: "animating", target: id }, "*");
        } catch (_) {}
      }

      function resumeFollow() {
        mode = "follow";
        setSprite(false);
        clearHighlight();
        vel.x = 0;
        vel.y = 0;
        hideCaption();
        status.textContent = DEFAULT_STATUS;
        try {
          parent.postMessage({ type: "cody-status", mode: "follow" }, "*");
        } catch (_) {}
      }

      function speak(text) {
        if (!("speechSynthesis" in window)) return;
        try {
          window.speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(text);
          u.rate = 1.05;
          window.speechSynthesis.speak(u);
        } catch (_) {}
      }

      /**
       * Score every .file by how many of its data-keywords + filename words
       * appear in the transcript; the raw data-id counts double. Best score wins.
       */
      function matchFile(text) {
        let bestId = null;
        let bestScore = 0;
        document.querySelectorAll(".file[data-id]").forEach(function (node) {
          const id = node.getAttribute("data-id");
          const words = new Set(
            ((node.getAttribute("data-keywords") || "").toLowerCase() + " " +
              fileName(id).toLowerCase().replace(/[._-]+/g, " "))
              .split(/\s+/)
              .filter(Boolean)
          );
          let score = 0;
          words.forEach(function (w) {
            if (text.indexOf(w) !== -1) score += 1;
          });
          if (text.indexOf(id) !== -1) score += 2;
          if (score > bestScore) {
            bestScore = score;
            bestId = id;
          }
        });
        return bestId;
      }

      /** Single entry point for voice, the HUD text box, and cody-command postMessage. */
      function handleCommand(transcript) {
        const text = String(transcript || "").toLowerCase().trim();
        if (!text) return;
        status.textContent = "Heard: “" + text + "”";
        if (FOLLOW_INTENT.test(text) || /^resume( follow(ing)?)?[.!]?$/.test(text)) {
          resumeFollow();
          return;
        }
        const id = matchFile(text);
        if (!id) {
          status.textContent = 'Didn\u2019t catch a file — try "point at the Shopee invoice"';
          showCaption("I didn't catch a file name.");
          return;
        }
        speak("Found it. Pointing at " + fileName(id) + ".");
        pointAt(id, THOUGHTS[id]);
      }

      function paintMeter(level) {
        if (!micBars.length) return;
        const n = micBars.length;
        const lit = Math.round(Math.min(1, level) * n);
        for (let i = 0; i < n; i++) {
          const bar = micBars[i];
          bar.classList.remove("lit", "hot", "peak");
          const active = i < lit;
          const h = active ? 6 + Math.round(((i + 1) / n) * 14 * Math.max(0.35, level)) : 3;
          bar.style.height = h + "px";
          if (active) {
            if (i >= n - 2) bar.classList.add("peak");
            else if (i >= n - 4) bar.classList.add("hot");
            else bar.classList.add("lit");
          }
        }
      }

      function stopMeter() {
        if (meterRaf) {
          cancelAnimationFrame(meterRaf);
          meterRaf = 0;
        }
        if (micStream) {
          micStream.getTracks().forEach(function (t) { t.stop(); });
          micStream = null;
        }
        if (audioCtx) {
          try { audioCtx.close(); } catch (_) {}
          audioCtx = null;
        }
        analyser = null;
        levelSmooth = 0;
        if (micMeter) {
          micMeter.classList.remove("on");
          micMeter.setAttribute("aria-hidden", "true");
        }
        paintMeter(0);
      }

      function meterLoop() {
        if (!analyser) return;
        const data = new Uint8Array(analyser.fftSize);
        analyser.getByteTimeDomainData(data);
        let sum = 0;
        for (let i = 0; i < data.length; i++) {
          const v = (data[i] - 128) / 128;
          sum += v * v;
        }
        const rms = Math.sqrt(sum / data.length);
        // Amplify speech-range levels for a readable bar
        const boosted = Math.min(1, rms * 4.2);
        levelSmooth = levelSmooth * 0.65 + boosted * 0.35;
        paintMeter(levelSmooth);
        meterRaf = requestAnimationFrame(meterLoop);
      }

      function startMeter() {
        if (micStream) return Promise.resolve(); // already running (recognition auto-restart)
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          status.textContent = "Mic meter needs getUserMedia (HTTPS or localhost)";
          return Promise.resolve();
        }
        return navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(function (stream) {
          micStream = stream;
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const source = audioCtx.createMediaStreamSource(stream);
          analyser = audioCtx.createAnalyser();
          analyser.fftSize = 512;
          analyser.smoothingTimeConstant = 0.7;
          source.connect(analyser);
          if (micMeter) {
            micMeter.classList.add("on");
            micMeter.setAttribute("aria-hidden", "false");
          }
          meterLoop();
        }).catch(function (err) {
          status.textContent = "Mic permission denied — " + (err && err.message ? err.message : "blocked");
        });
      }

      function setupSpeech() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
          btnMic.disabled = true;
          btnMic.title = "Speech recognition not supported in this browser";
          status.textContent = "No voice support here — type a command instead";
          return;
        }
        recognition = new SR();
        recognition.lang = "en-US";
        recognition.interimResults = false;
        recognition.maxAlternatives = 3;
        recognition.continuous = true;

        recognition.onstart = function () {
          listening = true;
          btnMic.classList.add("listening");
          btnMic.textContent = "🎤 Listening…";
          status.textContent = "Listening… say “find my boarding pass”";
          startMeter();
        };
        recognition.onend = function () {
          listening = false;
          if (micOn) {
            // Continuous sessions still end on silence/network hiccups — restart
            try {
              recognition.start();
              return;
            } catch (_) {}
          }
          micOn = false;
          btnMic.classList.remove("listening");
          btnMic.textContent = "🎤 Voice";
          stopMeter();
          if (status.textContent.indexOf("Listening") === 0) status.textContent = DEFAULT_STATUS;
        };
        recognition.onerror = function (ev) {
          const err = ev.error || "unknown";
          // Benign errors — onend fires next and auto-restarts while micOn
          if (err === "no-speech" || err === "aborted") return;
          micOn = false;
          status.textContent = "Mic error: " + err + " — type a command instead";
        };
        recognition.onresult = function (ev) {
          // Continuous mode appends results; only act on the newest one
          const last = ev.results[ev.results.length - 1];
          let best = "";
          for (let j = 0; j < last.length; j++) {
            const alt = last[j].transcript;
            if (alt && alt.length > best.length) best = alt;
          }
          if (best) handleCommand(best);
        };
      }

      function startMic() {
        if (!recognition) {
          status.textContent = "Speech recognition unavailable — type a command instead";
          return;
        }
        micOn = true;
        if (listening) return;
        try {
          recognition.start();
        } catch (_) {
          status.textContent = "Mic busy — try again";
        }
      }

      function stopMic() {
        micOn = false;
        if (!recognition || !listening) {
          stopMeter();
          return;
        }
        try { recognition.stop(); } catch (_) {}
      }

      function toggleMic() {
        if (micOn || listening) stopMic();
        else startMic();
      }

      function onMove(x, y) {
        if (!Number.isFinite(x) || !Number.isFinite(y)) return;
        mouse.x = x;
        mouse.y = y;
      }

      window.addEventListener("mousemove", function (e) {
        onMove(e.clientX, e.clientY);
      });

      window.addEventListener("message", function (e) {
        const data = e.data || {};
        if (data.type === "cody-mouse" && typeof data.x === "number") onMove(data.x, data.y);
        if (data.type === "cody-point") {
          if (typeof data.x === "number" && typeof data.y === "number") {
            mode = "animating";
            setSprite(true);
            vel.x = 0;
            vel.y = 0;
            animFrom = { x: pos.x, y: pos.y };
            animTo = { x: data.x - SIZE * 0.25, y: data.y - SIZE * 0.25 };
            animStart = performance.now();
            target = { x: data.x, y: data.y, el: null };
            showCaption(data.thought || "I think this is it.");
          } else if (data.id) {
            pointAt(data.id, data.thought);
          }
        }
        if (data.type === "cody-follow") resumeFollow();
        if (data.type === "cody-heard" && data.transcript) handleCommand(data.transcript);
        if (data.type === "cody-command" && data.text) handleCommand(data.text);
      });

      function tick(now) {
        if (mode === "follow") {
          const slot = slotPos();
          const ax = (slot.x - pos.x) * SPRING;
          const ay = (slot.y - pos.y) * SPRING;
          vel.x = (vel.x + ax) * DAMP;
          vel.y = (vel.y + ay) * DAMP;
          place(pos.x + vel.x, pos.y + vel.y);
        } else if (mode === "animating") {
          const t = Math.min(1, (now - animStart) / ANIM_MS);
          const e = easeInOutCubic(t);
          place(
            animFrom.x + (animTo.x - animFrom.x) * e,
            animFrom.y + (animTo.y - animFrom.y) * e
          );
          if (t >= 1) {
            mode = "pointed";
            if (target && target.el) target.el.classList.add("highlight");
            ring.style.left = (target ? target.x : animTo.x) + "px";
            ring.style.top = (target ? target.y : animTo.y) + "px";
            ring.classList.remove("pop");
            void ring.offsetWidth;
            ring.classList.add("pop");
            status.textContent = "Found it";
            try {
              parent.postMessage({ type: "cody-status", mode: "pointed" }, "*");
            } catch (_) {}
          }
        } else if (mode === "pointed") {
          // Stay put; keep caption parked next to Cody
          place(pos.x, pos.y);
        }
        requestAnimationFrame(tick);
      }

      setupSpeech();
      requestAnimationFrame(tick);

      const cmdInput = document.getElementById("cmd-input");
      const btnRun = document.getElementById("btn-run");

      function runTypedCommand() {
        const text = cmdInput.value;
        cmdInput.value = "";
        handleCommand(text);
      }

      document.getElementById("btn-point").onclick = function (e) {
        e.currentTarget.blur();
        pointAt("lazada");
      };
      document.getElementById("btn-shopee").onclick = function (e) {
        e.currentTarget.blur();
        pointAt("shopee");
      };
      document.getElementById("btn-follow").onclick = function (e) {
        e.currentTarget.blur();
        resumeFollow();
      };
      btnMic.onclick = function (e) {
        e.preventDefault();
        toggleMic();
      };
      btnRun.onclick = function (e) {
        e.currentTarget.blur();
        runTypedCommand();
      };
      cmdInput.addEventListener("keydown", function (e) {
        // Keep single-key shortcuts (1/2/v//) from firing while typing
        e.stopPropagation();
        if (e.key === "Enter") runTypedCommand();
        if (e.key === "Escape") cmdInput.blur();
      });

      window.addEventListener("keydown", function (e) {
        if (e.repeat) return;
        if (document.activeElement === cmdInput) return;
        if (e.key === "1") pointAt("lazada");
        if (e.key === "2") pointAt("shopee");
        if (e.key === "Escape") resumeFollow();
        if (e.key === "v" || e.key === "V") {
          e.preventDefault();
          toggleMic();
        }
        if (e.key === "/") {
          e.preventDefault();
          cmdInput.focus();
        }
      });

      try {
        parent.postMessage({ type: "cody-ready", slot: SLOT, size: SIZE }, "*");
      } catch (_) {}
      place(pos.x, pos.y);
    })();
  </script>
</body>
</html>
