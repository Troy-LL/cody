<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cody Lens</title>
  <style>
    :root {
      --cody-blue: #1b4fd8;
      --cody-ink: #0a1628;
      --cody-wash: #e8f0fe;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
      font-family: "Segoe UI", system-ui, sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }
    /* Full window is a hole — only the ring + chrome paint */
    .lens {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    .ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(78vmin, 320px);
      height: min(78vmin, 320px);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 6px solid rgba(27, 79, 216, 0.95);
      box-shadow:
        0 0 0 3px rgba(232, 240, 254, 0.35),
        0 12px 40px rgba(10, 22, 40, 0.35),
        inset 0 0 40px rgba(232, 240, 254, 0.08);
      background: transparent;
    }
    .ring::after {
      content: "";
      position: absolute;
      right: -28px;
      bottom: -36px;
      width: 56px;
      height: 14px;
      border-radius: 8px;
      background: var(--cody-blue);
      transform: rotate(45deg);
      box-shadow: 0 4px 12px rgba(10, 22, 40, 0.35);
    }
    .badge {
      position: absolute;
      left: 50%;
      top: calc(50% - min(39vmin, 160px) - 8px);
      transform: translate(-50%, -100%);
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(10, 22, 40, 0.92);
      color: var(--cody-wash);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      pointer-events: auto;
      cursor: default;
    }
    .hint {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      max-width: 90%;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(10, 22, 40, 0.88);
      color: #fff;
      font-size: 12px;
      text-align: center;
      line-height: 1.35;
      pointer-events: none;
    }
    #cody {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 56px;
      height: 56px;
      margin: -28px 0 0 -28px;
      filter: drop-shadow(0 2px 6px rgba(10, 22, 40, 0.45));
      transition: transform 120ms ease;
    }
    #cody.point {
      transform: scale(1.08) rotate(-8deg);
    }
    .drag {
      position: absolute;
      inset: 0;
      pointer-events: auto;
      cursor: grab;
      /* only the outer frame receives drag — center hole is cut via SVG mask feel:
         we use a hollow hit region approximated by not covering center */
      background: transparent;
    }
    /* Clickable ring only: doughnut using huge box-shadow trick isn't needed —
       host window moves with OS mouse when ?follow=1 */
  </style>
</head>
<body>
  <div class="lens" id="lens">
    <div class="badge">Cody</div>
    <div class="ring" aria-hidden="true"></div>
    <svg id="cody" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path id="pointer-path"
        d="M6 4 L6 36 L14.5 28.5 L20 42 L26 39.5 L20.5 26 L32 26 Z"
        fill="#1B4FD8" stroke="#0A1628" stroke-width="1.5" stroke-linejoin="round"/>
      <circle cx="34" cy="14" r="9" fill="#E8F0FE" stroke="#1B4FD8" stroke-width="2"/>
      <circle cx="31.5" cy="13" r="1.4" fill="#0A1628"/>
      <circle cx="36.5" cy="13" r="1.4" fill="#0A1628"/>
      <path d="M31 17.5 Q34 20 37 17.5" stroke="#0A1628" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    </svg>
    <div class="hint" id="hint">HTML lens — hole shows your desktop through the host window. Press <kbd>1</kbd> to pose-point.</div>
  </div>
  <script>
    (function () {
      const cody = document.getElementById("cody");
      const path = document.getElementById("pointer-path");
      const hint = document.getElementById("hint");
      const DEFAULT = "M6 4 L6 36 L14.5 28.5 L20 42 L26 39.5 L20.5 26 L32 26 Z";
      const POINT = "M6 4 L4 34 L13 27 L17.5 41 L24 38 L19.5 24.5 L31 22 Z";

      function setPoint(on) {
        path.setAttribute("d", on ? POINT : DEFAULT);
        cody.classList.toggle("point", on);
        hint.textContent = on
          ? "Pointing pose — press Esc to relax."
          : "HTML lens — hole shows your desktop through the host window. Press 1 to pose-point.";
      }

      window.addEventListener("keydown", function (e) {
        if (e.repeat) return;
        if (e.key === "1") setPoint(true);
        if (e.key === "Escape") setPoint(false);
      });

      // Soft idle bob so Cody feels alive in the hole
      let t0 = performance.now();
      function bob(now) {
        const t = (now - t0) / 1000;
        const y = Math.sin(t * 2.2) * 4;
        cody.style.marginTop = (-28 + y) + "px";
        requestAnimationFrame(bob);
      }
      requestAnimationFrame(bob);

      // Tell native host we're ready
      try {
        if (window.pywebview) {
          /* host can listen */
        }
      } catch (_) {}
    })();
  </script>
</body>
</html>
