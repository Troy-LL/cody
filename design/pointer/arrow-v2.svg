<!--
  Clicky pointer overlay - arrow-v2 "Chevron"
  Metaphor: a single wayfinding chevron, two arms folding down into one
  point, like signage rather than a cursor. Flat-cut top ends signal it is
  a directional mark, not a whole object with a tail.
  Tip point (the pixel that must land on the icon): x=12, y=21.

  Dual-background outline convention: two overlapping outline paths trace the
  same chevron silhouette. `.pointer-outline-light` (charcoal #0F172A) is the
  default outline, visible as shipped, for light Explorer backgrounds (e.g.
  #FFFFFF). `.pointer-outline-dark` (paper #F8FAFC, from palette.json) is the
  outline for dark Explorer backgrounds (e.g. #1E1E1E) and ships with inline
  `style="display:none"`. An integrator targeting a dark Explorer theme picks
  it by swapping which of the two paths carries `display:none` (string
  replace, DOM/class toggle, or equivalent) before rendering or exporting.
  Inline `style` (not a CSS media query) drives the toggle so the choice is
  explicit and doesn't depend on a renderer supporting
  `prefers-color-scheme` (e.g. headless PNG export tooling).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <path
    class="pointer-outline-light"
    d="M2,3 L12,21 L22,3 L18,3 L12,13 L6,3 Z"
    fill="#2563EB"
    stroke="#0F172A"
    stroke-width="2"
    stroke-linejoin="round"
  />
  <path
    class="pointer-outline-dark"
    d="M2,3 L12,21 L22,3 L18,3 L12,13 L6,3 Z"
    fill="#2563EB"
    stroke="#F8FAFC"
    stroke-width="2"
    stroke-linejoin="round"
    style="display:none"
  />
</svg>
